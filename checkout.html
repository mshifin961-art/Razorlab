<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout | RazorLab</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        .metallic-text {
            background: linear-gradient(135deg, #f3f4f6 0%, #9ca3af 50%, #d1d5db 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .glass-panel {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(156, 163, 175, 0.15);
        }
    </style>
</head>
<body class="bg-black text-gray-200 font-sans antialiased selection:bg-gray-700 selection:text-white">

    <nav class="w-full z-50 glass-panel border-b-0 py-4">
        <div class="max-w-7xl mx-auto px-6 flex justify-center items-center">
            <h1 class="text-2xl font-bold tracking-widest metallic-text">RAZORLAB</h1>
        </div>
    </nav>

    <div class="max-w-5xl mx-auto px-6 py-12">
        <a href="index.html" class="text-gray-500 hover:text-white transition text-sm mb-8 inline-block">&larr; Back to Cart</a>
        
        <h2 class="text-3xl md:text-4xl font-extrabold mb-10 metallic-text">Secure Checkout</h2>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
            
            <div class="space-y-6">
                <div class="glass-panel p-8 rounded-2xl">
                    <h3 class="text-xl font-bold text-white mb-6 tracking-wide">Shipping Information</h3>
                    <form class="space-y-5">
                        <div class="grid grid-cols-2 gap-5">
                            <div>
                                <label class="block text-xs text-gray-500 uppercase tracking-widest mb-2 font-bold">First Name</label>
                                <input type="text" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 text-white focus:outline-none focus:border-white transition">
                            </div>
                            <div>
                                <label class="block text-xs text-gray-500 uppercase tracking-widest mb-2 font-bold">Last Name</label>
                                <input type="text" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 text-white focus:outline-none focus:border-white transition">
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs text-gray-500 uppercase tracking-widest mb-2 font-bold">Email Address</label>
                            <input type="email" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 text-white focus:outline-none focus:border-white transition">
                        </div>
                        <div>
                            <label class="block text-xs text-gray-500 uppercase tracking-widest mb-2 font-bold">Shipping Address</label>
                            <textarea rows="3" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 text-white focus:outline-none focus:border-white transition"></textarea>
                        </div>
                        <div class="grid grid-cols-2 gap-5">
                            <div>
                                <label class="block text-xs text-gray-500 uppercase tracking-widest mb-2 font-bold">City</label>
                                <input type="text" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 text-white focus:outline-none focus:border-white transition">
                            </div>
                            <div>
                                <label class="block text-xs text-gray-500 uppercase tracking-widest mb-2 font-bold">PIN Code</label>
                                <input type="text" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 text-white focus:outline-none focus:border-white transition">
                            </div>
                        </div>
                    </form>
                </div>
            </div>

            <div>
                <div class="glass-panel p-8 rounded-2xl mb-6">
                    <h3 class="text-xl font-bold text-white mb-6 tracking-wide">Order Summary</h3>
                    
                    <div class="flex justify-between items-center mb-6 pb-6 border-b border-gray-800">
                        <div class="flex items-center gap-4">
                            <div class="w-8 h-16 bg-gray-900 rounded-md shadow-inner border border-gray-700"></div>
                            <div>
                                <p class="text-white font-bold">5-Blade Pro</p>
                                <p class="text-gray-500 text-sm">Custom Handle</p>
                            </div>
                        </div>
                        <p class="text-white font-bold">₹1,499</p>
                    </div>

                    <div class="flex justify-between text-gray-400 text-sm mb-3">
                        <span>Subtotal</span>
                        <span>₹1,499</span>
                    </div>
                    <div class="flex justify-between text-gray-400 text-sm mb-6 pb-6 border-b border-gray-800">
                        <span>Shipping</span>
                        <span class="text-green-500 font-bold">FREE</span>
                    </div>
                    <div class="flex justify-between text-2xl font-bold text-white mb-8">
                        <span>Total</span>
                        <span>₹1,499</span>
                    </div>
                    <button id="pay-btn" type="button" onclick="processPayment()" class="relative w-full py-4 bg-white text-black font-bold rounded-full hover:bg-gray-200 transition shadow-[0_0_20px_rgba(255,255,255,0.2)] overflow-hidden">
    <span id="btn-text">Pay with UPI / Card</span>
    
    <!-- Loading Spinner (Hidden by default) -->
    <div id="loading-spinner" class="hidden absolute inset-0 flex items-center justify-center bg-gray-200">
        <svg class="animate-spin h-6 w-6 text-black" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
    </div>
                    </button>
                </div>
                <p class="text-xs text-gray-600 text-center flex items-center justify-center gap-2">
                    <span>🔒</span> Secure 256-bit SSL encryption.
                </p>
            </div>

        </div>
    </div>
    <script>
        function processPayment() {
            const btnText = document.getElementById('btn-text');
            const spinner = document.getElementById('loading-spinner');
            const payBtn = document.getElementById('pay-btn');

            // 1. Show loading state
            btnText.classList.add('hidden');
            spinner.classList.remove('hidden');
            payBtn.disabled = true; // Prevent double clicking
            payBtn.classList.remove('hover:bg-gray-200');

            // 2. Simulate Payment processing (3 seconds wait)
            setTimeout(() => {
                spinner.classList.add('hidden');
                btnText.classList.remove('hidden');
                
                // Show Success Message
                btnText.innerText = "Payment Successful ✓";
                payBtn.classList.replace('bg-white', 'bg-green-500');
                payBtn.classList.replace('text-black', 'text-white');
                payBtn.classList.replace('shadow-[0_0_20px_rgba(255,255,255,0.2)]', 'shadow-[0_0_20px_rgba(34,197,94,0.4)]');

                // 3. Redirect back to home after 2 seconds
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
                
            }, 3000);
        }
                </script>
</body>
          </html>
